<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thắng Tâm Học TOEIC</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#26215C;
    --teal:#0F6E56;--teal-light:#E1F5EE;
    --red-light:#FCEBEB;--red:#A32D2D;
    --green-light:#EAF3DE;--green:#3B6D11;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --gray:#888;--gray-light:#F5F5F3;--gray-border:#E0DDD5;
    --text:#1a1a1a;--text-muted:#666;
    --bg:#FAFAF8;--card:#fff;
    --radius:10px;--radius-lg:14px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
  header{background:var(--purple-dark);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
  header h1{font-size:18px;font-weight:600}
  .total-prog{font-size:12px;background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:20px}
  .layout{display:flex;min-height:calc(100vh - 56px)}
  .sidebar{width:220px;min-width:220px;background:var(--card);border-right:1px solid var(--gray-border);padding:16px 0;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
  .main{flex:1;padding:24px;max-width:900px}
  .sidebar-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;padding:0 16px 8px}
  .day-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;transition:background 0.15s;border-left:3px solid transparent}
  .day-item:hover{background:var(--gray-light)}
  .day-item.active{background:var(--purple-light);border-left-color:var(--purple);color:var(--purple-dark)}
  .day-item .day-num{font-weight:600;font-size:13px;min-width:52px}
  .day-item .day-topic{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day-item.active .day-topic{color:var(--purple)}
  .topic-header{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px}
  .topic-header h2{font-size:20px;font-weight:600;color:var(--purple-dark);margin-bottom:6px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .badge-purple{background:var(--purple-light);color:var(--purple-dark)}
  .badge-teal{background:var(--teal-light);color:var(--teal)}
  .progress-bar{height:6px;background:var(--gray-light);border-radius:3px;overflow:hidden;margin-top:10px}
  .progress-fill{height:100%;background:var(--purple);border-radius:3px;transition:width 0.4s}
  .progress-label{font-size:12px;color:var(--text-muted);margin-bottom:4px;display:flex;justify-content:space-between}
  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--gray-border)}
  .tab{padding:9px 16px;cursor:pointer;font-size:14px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:var(--radius) var(--radius) 0 0;transition:all 0.15s;white-space:nowrap}
  .tab:hover{background:var(--gray-light)}
  .tab.active{color:var(--purple);border-bottom-color:var(--purple);background:var(--purple-light);font-weight:500}

  /* WORD CARDS (List view) */
  .word-cards{display:flex;flex-direction:column;gap:12px}
  .word-card{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);overflow:hidden}
  .word-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
  .word-card-header:hover{background:var(--gray-light)}
  .word-main{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
  .word-en{font-size:18px;font-weight:700;color:var(--purple-dark)}
  .word-ph{font-size:13px;color:var(--text-muted)}
  .word-type{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--purple-light);color:var(--purple-dark);font-weight:500}
  .word-vi{font-size:14px;color:var(--teal);font-weight:500;margin-left:auto}
  .btn-audio{background:none;border:1px solid var(--gray-border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:16px;transition:all 0.15s;color:var(--purple)}
  .btn-audio:hover{background:var(--purple-light);border-color:var(--purple)}
  .btn-audio.playing{background:var(--purple-light);border-color:var(--purple);animation:pulse 0.6s infinite alternate}
  @keyframes pulse{from{opacity:1}to{opacity:0.5}}
  .btn-mark{font-size:12px;padding:5px 12px;border:1px solid var(--gray-border);border-radius:20px;background:var(--card);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:inherit}
  .btn-mark.marked{background:var(--green-light);border-color:var(--green);color:var(--green)}
  .word-expand{padding:0 16px 14px;border-top:1px solid var(--gray-border)}
  .expand-toggle{font-size:13px;color:var(--text-muted)}

  /* EXAMPLES SECTION */
  .examples-wrap{margin-top:12px}
  .examples-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
  .example-item{background:var(--gray-light);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px}
  .example-en{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:3px}
  .example-en .highlight{color:var(--purple);font-weight:600;text-decoration:underline;text-decoration-color:rgba(83,74,183,0.3)}
  .example-vi{font-size:13px;color:var(--text-muted);font-style:italic}

  /* USAGE SECTION */
  .usage-wrap{margin-top:10px}
  .usage-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
  .usage-tags{display:flex;flex-wrap:wrap;gap:6px}
  .usage-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--amber-light);color:var(--amber);border:1px solid rgba(186,117,23,0.2)}

  /* FLASHCARD */
  .fc-container{display:flex;flex-direction:column;align-items:center;gap:16px}
  .flashcard{width:100%;max-width:540px;min-height:220px;background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:box-shadow 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;user-select:none}
  .flashcard:hover{box-shadow:0 4px 16px rgba(83,74,183,0.12)}
  .fc-word{font-size:32px;font-weight:700;color:var(--purple-dark)}
  .fc-ph{font-size:14px;color:var(--text-muted)}
  .fc-type{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--purple-light);color:var(--purple-dark)}
  .fc-hint{font-size:13px;color:var(--text-muted);margin-top:6px}
  .fc-meaning{font-size:24px;font-weight:600;color:var(--teal)}
  .fc-example{font-size:13px;color:var(--text-muted);font-style:italic;margin-top:6px;line-height:1.5;max-width:400px}
  .fc-audio-btn{padding:6px 16px;border:1px solid var(--purple);border-radius:var(--radius);background:var(--purple-light);cursor:pointer;font-size:13px;color:var(--purple);font-family:inherit}
  .fc-rating{display:flex;gap:10px;margin-top:8px}
  .fc-rating button{padding:7px 20px;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
  .btn-know{background:var(--green-light);color:var(--green)}
  .btn-dontknow{background:var(--red-light);color:var(--red)}
  .fc-nav{display:flex;align-items:center;gap:16px}
  .fc-nav button{padding:9px 22px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit}
  .fc-nav button:hover{background:var(--gray-light)}
  .fc-counter{font-size:14px;color:var(--text-muted);min-width:60px;text-align:center}

  /* QUIZ */
  .quiz-wrap{max-width:580px}
  .score-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .score-chip{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500}
  .score-chip.correct{background:var(--green-light);color:var(--green)}
  .score-chip.wrong{background:var(--red-light);color:var(--red)}
  .score-chip.total{background:var(--purple-light);color:var(--purple-dark)}
  .quiz-q{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px;font-size:16px;font-weight:500;line-height:1.5}
  .quiz-context{font-size:13px;color:var(--text-muted);font-style:italic;margin-top:6px;font-weight:400}
  .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .opt{padding:12px 14px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;text-align:left;font-family:inherit;line-height:1.4;transition:all 0.15s}
  .opt:hover:not(:disabled){background:var(--gray-light)}
  .opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:500}
  .opt.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .feedback{padding:12px 14px;border-radius:var(--radius);font-size:14px;margin-bottom:12px}
  .feedback.ok{background:var(--green-light);color:var(--green)}
  .feedback.fail{background:var(--red-light);color:var(--red)}
  .btn-primary{padding:10px 24px;background:var(--purple);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;font-size:14px;font-family:inherit;font-weight:500}
  .btn-primary:hover{background:var(--purple-dark)}

  /* FILL */
  .fill-wrap{max-width:560px}
  .fill-input{width:100%;padding:11px 16px;border:1px solid var(--gray-border);border-radius:var(--radius);font-size:16px;font-family:inherit;background:var(--card);color:var(--text);margin-bottom:10px}
  .fill-input:focus{outline:none;border-color:var(--purple)}
  .fill-actions{display:flex;gap:8px;margin-bottom:12px}

  /* MATCH */
  .match-info{font-size:13px;color:var(--text-muted);margin-bottom:12px}
  .match-btn{padding:11px 12px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit;text-align:center;line-height:1.3;transition:all 0.15s}
  .match-btn:hover:not([disabled]){background:var(--gray-light)}
  .match-btn.selected{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);font-weight:500}
  .match-btn.matched{background:var(--green-light);border-color:var(--green);color:var(--green);cursor:default}
  .match-btn.err{background:var(--red-light);border-color:var(--red)}

  @media(max-width:640px){
    .sidebar{display:none}
    .main{padding:16px}
    .quiz-opts{grid-template-columns:1fr}
    .word-vi{margin-left:0;width:100%}
  }
</style>
</head>
<body>
<header>
  <h1>🎓 Thắng Tâm Học TOEIC</h1>
  <span class="total-prog" id="totalProg">0 / 1000 từ</span>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="mainContent"></main>
</div>

<script>
// ============================================================
// AUDIO — dùng Web Speech API (built-in trình duyệt, miễn phí)
// ============================================================
function speak(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1;
  // ưu tiên giọng nữ Mỹ nếu có
  const voices = window.speechSynthesis.getVoices();
  const en = voices.find(v => v.lang === 'en-US' && v.name.includes('Female'))
           || voices.find(v => v.lang === 'en-US')
           || voices.find(v => v.lang.startsWith('en'));
  if (en) u.voice = en;
  window.speechSynthesis.speak(u);
}

// ============================================================
// STATE
// ============================================================
const state = {
  day:0, tab:'list',
  flash:{idx:0,flipped:false},
  quiz:{idx:0,correct:0,total:0,answered:false,shuffled:[]},
  fill:{idx:0,correct:0,total:0,answered:false,shuffled:[]},
  learned: JSON.parse(localStorage.getItem('tt_learned')||'[]')
};

function saveState(){localStorage.setItem('tt_learned',JSON.stringify(state.learned));}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}
function getWords(){return DAYS[state.day].words;}
function totalLearned(){return state.learned.length;}
function markLearned(w){
  if(!state.learned.includes(w)){state.learned.push(w);saveState();}
  document.getElementById('totalProg').textContent=totalLearned()+' / 1000 từ';
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='<div class="sidebar-title">Lịch học</div>';
  DAYS.forEach((d,i)=>{
    const done=d.words.every(w=>state.learned.includes(w.w));
    h+=`<div class="day-item${state.day===i?' active':''}" onclick="selectDay(${i})">
      <span class="day-num">Ngày ${i+1}</span>
      <span class="day-topic">${d.topic}</span>
      ${done?'<span style="color:var(--green);margin-left:auto">✓</span>':''}
    </div>`;
  });
  sb.innerHTML=h;
}

function selectDay(i){
  state.day=i; state.tab='list';
  state.flash={idx:0,flipped:false};
  state.quiz={idx:0,correct:0,total:0,answered:false,shuffled:shuffle(DAYS[i].words)};
  state.fill={idx:0,correct:0,total:0,answered:false,shuffled:shuffle(DAYS[i].words)};
  renderSidebar(); renderMain();
}

// ============================================================
// MAIN
// ============================================================
function renderMain(){
  const d=DAYS[state.day];
  const lc=d.words.filter(w=>state.learned.includes(w.w)).length;
  const pct=Math.round(lc/d.words.length*100);
  document.getElementById('mainContent').innerHTML=`
  <div class="topic-header">
    <h2>Ngày ${state.day+1}: ${d.topic}</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="badge badge-purple">${d.words.length} từ</span>
      <span class="badge badge-teal">${lc} đã học</span>
    </div>
    <div class="progress-label" style="margin-top:10px"><span>Tiến độ hôm nay</span><span>${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="tabs">
    <div class="tab${state.tab==='list'?' active':''}" onclick="switchTab('list')">📋 Từ vựng</div>
    <div class="tab${state.tab==='flash'?' active':''}" onclick="switchTab('flash')">🃏 Flashcard</div>
    <div class="tab${state.tab==='quiz'?' active':''}" onclick="switchTab('quiz')">❓ Trắc nghiệm</div>
    <div class="tab${state.tab==='fill'?' active':''}" onclick="switchTab('fill')">✍️ Điền từ</div>
    <div class="tab${state.tab==='match'?' active':''}" onclick="switchTab('match')">🔗 Ghép đôi</div>
  </div>
  <div id="tabContent"></div>`;
  document.getElementById('totalProg').textContent=totalLearned()+' / 1000 từ';
  renderTab();
}

function switchTab(t){
  state.tab=t;
  if(t==='quiz') state.quiz={idx:0,correct:0,total:0,answered:false,shuffled:shuffle(getWords())};
  if(t==='fill') state.fill={idx:0,correct:0,total:0,answered:false,shuffled:shuffle(getWords())};
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.className='tab'+(['list','flash','quiz','fill','match'][i]===t?' active':'');
  });
  renderTab();
}

function renderTab(){
  const tc=document.getElementById('tabContent');
  if(!tc)return;
  switch(state.tab){
    case 'list':  tc.innerHTML=renderList(); break;
    case 'flash': tc.innerHTML=renderFlash(); break;
    case 'quiz':  tc.innerHTML=renderQuiz(); break;
    case 'fill':  tc.innerHTML=renderFill(); setupFillEvents(); break;
    case 'match': tc.innerHTML=renderMatch(); break;
  }
}

// ============================================================
// LIST — có ví dụ câu + tags + phát âm
// ============================================================
function renderList(){
  const words=getWords();
  return '<div class="word-cards">'+words.map((w,i)=>{
    const known=state.learned.includes(w.w);
    const exHtml=w.ex.map(e=>`
      <div class="example-item">
        <div class="example-en">${e.e.replace(/<b>(.*?)<\/b>/g,'<span class="highlight">$1</span>')}</div>
        <div class="example-vi">${e.v}</div>
      </div>`).join('');
    const tagHtml=(w.tags||[]).map(t=>`<span class="usage-tag">${t}</span>`).join('');
    return `
    <div class="word-card" id="wc_${i}">
      <div class="word-card-header" onclick="toggleCard(${i})">
        <div class="word-main">
          <span class="word-en">${w.w}</span>
          <span class="word-ph">${w.ph}</span>
          <span class="word-type">${w.tp}</span>
          <span class="word-vi">${w.m}</span>
        </div>
        <button class="btn-audio" onclick="event.stopPropagation();speak('${w.w}')" title="Nghe phát âm">🔊</button>
        <button class="btn-mark${known?' marked':''}" onclick="event.stopPropagation();markLearned('${w.w}');this.textContent='✓ Đã học';this.classList.add('marked')">
          ${known?'✓ Đã học':'Đánh dấu'}
        </button>
      </div>
      <div class="word-expand" id="we_${i}" style="display:none">
        <div class="examples-wrap">
          <div class="examples-title">📖 Ví dụ câu</div>
          ${exHtml}
        </div>
        <div class="usage-wrap">
          <div class="usage-title">🏷️ Ngữ cảnh sử dụng</div>
          <div class="usage-tags">${tagHtml}</div>
        </div>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function toggleCard(i){
  const el=document.getElementById('we_'+i);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

// ============================================================
// FLASHCARD — có phát âm + ví dụ
// ============================================================
function renderFlash(){
  const words=getWords();
  const w=words[state.flash.idx];
  const ex=w.ex&&w.ex[0]?w.ex[0].e.replace(/<b>(.*?)<\/b>/g,'<u>$1</u>'):'';
  const flipped=state.flash.flipped;
  return `<div class="fc-container">
    <div class="flashcard" id="fc" onclick="flipFC()">
      ${!flipped?`
        <div class="fc-word">${w.w}</div>
        <div class="fc-ph">${w.ph}</div>
        <div class="fc-type">${w.tp}</div>
        <button class="fc-audio-btn" onclick="event.stopPropagation();speak('${w.w}')">🔊 Nghe phát âm</button>
        <div class="fc-hint">Nhấn thẻ để xem nghĩa</div>
      `:`
        <div class="fc-meaning">${w.m}</div>
        <div style="font-size:15px;color:var(--text-muted)">${w.w} — ${w.ph}</div>
        ${ex?`<div class="fc-example">${ex}</div>`:''}
        <div class="fc-rating">
          <button class="fc-rating btn-dontknow" onclick="event.stopPropagation();rateFC(false)">😕 Chưa nhớ</button>
          <button class="fc-rating btn-know" onclick="event.stopPropagation();rateFC(true)">✅ Đã nhớ</button>
        </div>
      `}
    </div>
    <div class="fc-nav">
      <button onclick="prevFC()">← Trước</button>
      <span class="fc-counter">${state.flash.idx+1} / ${words.length}</span>
      <button onclick="nextFC()">Tiếp →</button>
    </div>
    <div style="font-size:13px;color:var(--text-muted);text-align:center">Dùng ← → để chuyển thẻ</div>
  </div>`;
}

function flipFC(){state.flash.flipped=!state.flash.flipped;renderTab();}
function nextFC(){const w=getWords();state.flash.idx=(state.flash.idx+1)%w.length;state.flash.flipped=false;renderTab();}
function prevFC(){const w=getWords();state.flash.idx=(state.flash.idx-1+w.length)%w.length;state.flash.flipped=false;renderTab();}
function rateFC(knew){if(knew)markLearned(getWords()[state.flash.idx].w);nextFC();}

document.addEventListener('keydown',e=>{
  if(state.tab!=='flash')return;
  if(e.key==='ArrowRight')nextFC();
  if(e.key==='ArrowLeft')prevFC();
  if(e.key===' '){e.preventDefault();flipFC();}
});

// ============================================================
// QUIZ — câu hỏi có ngữ cảnh câu
// ============================================================
function renderQuiz(){
  const q=state.quiz;
  const words=q.shuffled;
  const qw=words[q.idx%words.length];
  const wrongs=shuffle(getWords().filter(x=>x.w!==qw.w)).slice(0,3).map(x=>x.m);
  const opts=shuffle([qw.m,...wrongs]);
  const ctxEx=qw.ex&&qw.ex[0]?qw.ex[0].e.replace(/<b>(.*?)<\/b>/g,'<b>______</b>'):'';
  return `<div class="quiz-wrap">
    <div class="score-row">
      <span class="score-chip correct">✓ ${q.correct}</span>
      <span class="score-chip wrong">✗ ${q.total-q.correct}</span>
      <span class="score-chip total">Tổng: ${q.total}</span>
    </div>
    <div class="quiz-q">
      Từ <strong>"${qw.w}"</strong> <span style="color:var(--text-muted);font-size:14px">${qw.ph}</span> có nghĩa là gì?
      ${ctxEx?`<div class="quiz-context">💬 ${ctxEx}</div>`:''}
    </div>
    <div class="quiz-opts">
      ${opts.map(o=>`<button class="opt" onclick="answerQuiz(this,'${esc(o)}','${esc(qw.m)}','${esc(qw.w)}')">${o}</button>`).join('')}
    </div>
    <div id="qfb"></div>
    <button class="btn-primary" id="nextQ" style="display:none" onclick="nextQuiz()">Câu tiếp →</button>
  </div>`;
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function answerQuiz(btn,chosen,correct,word){
  if(state.quiz.answered)return;
  state.quiz.answered=true;
  state.quiz.total++;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(chosen===correct){
    state.quiz.correct++;
    btn.classList.add('correct');
    document.getElementById('qfb').innerHTML=`<div class="feedback ok">✅ Chính xác! <strong>${word}</strong> = ${correct}</div>`;
    markLearned(word);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    document.getElementById('qfb').innerHTML=`<div class="feedback fail">❌ Sai! Đáp án: <strong>${correct}</strong></div>`;
  }
  document.getElementById('nextQ').style.display='inline-block';
}
function nextQuiz(){state.quiz.idx++;state.quiz.answered=false;renderTab();}

// ============================================================
// FILL
// ============================================================
function renderFill(){
  const f=state.fill;
  const qw=f.shuffled[f.idx%f.shuffled.length];
  const ex=qw.ex&&qw.ex[0]?qw.ex[0].e.replace(/<b>(.*?)<\/b>/g,'______'):'';
  return `<div class="fill-wrap">
    <div class="score-row">
      <span class="score-chip correct">✓ ${f.correct}</span>
      <span class="score-chip wrong">✗ ${f.total-f.correct}</span>
      <span class="score-chip total">Tổng: ${f.total}</span>
    </div>
    <div class="quiz-q">
      Nghĩa: <strong>${qw.m}</strong><br>
      <span style="font-size:13px;color:var(--text-muted)">Loại từ: ${qw.tp} | ${qw.ph}</span>
      ${ex?`<div class="quiz-context">💬 ${ex}</div>`:''}
    </div>
    <input class="fill-input" id="fillInp" type="text" placeholder="Nhập từ tiếng Anh..." autocomplete="off"/>
    <div class="fill-actions">
      <button class="btn-primary" onclick="checkFill('${esc(qw.w)}')">Kiểm tra</button>
      <button style="padding:9px 16px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit" onclick="speak('${qw.w}')">🔊 Gợi ý âm</button>
      <button style="padding:9px 16px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit" onclick="hintFill('${esc(qw.w)}')">💡 Gợi ý chữ</button>
    </div>
    <div id="ffb"></div>
    <button class="btn-primary" id="nextF" style="display:none;margin-top:10px" onclick="nextFill()">Câu tiếp →</button>
  </div>`;
}

function setupFillEvents(){
  const inp=document.getElementById('fillInp');
  if(inp){
    inp.focus();
    const qw=state.fill.shuffled[state.fill.idx%state.fill.shuffled.length];
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill(qw.w);});
  }
}

function hintFill(correct){const inp=document.getElementById('fillInp');if(inp)inp.value=correct[0]+'_'.repeat(correct.length-1);}
function checkFill(correct){
  if(state.fill.answered)return;
  const inp=document.getElementById('fillInp');
  if(!inp)return;
  const val=inp.value.trim().toLowerCase();
  state.fill.answered=true;
  state.fill.total++;
  inp.disabled=true;
  if(val===correct.toLowerCase()){
    state.fill.correct++;
    document.getElementById('ffb').innerHTML=`<div class="feedback ok">✅ Chính xác!</div>`;
    markLearned(correct);
  } else {
    document.getElementById('ffb').innerHTML=`<div class="feedback fail">❌ Sai! Đáp án: <strong>${correct}</strong></div>`;
  }
  document.getElementById('nextF').style.display='inline-block';
  speak(correct);
}
function nextFill(){state.fill.idx++;state.fill.answered=false;renderTab();setupFillEvents();}

// ============================================================
// MATCH
// ============================================================
let MS={sel:null,done:0,words:[],meanings:[],matched:new Set()};
function renderMatch(){
  const pairs=shuffle(getWords()).slice(0,7);
  MS={sel:null,done:0,words:shuffle(pairs.map(p=>p.w)),meanings:shuffle(pairs.map(p=>({id:p.w,m:p.m}))),matched:new Set()};
  const leftCol=MS.words.map(w=>`<button class="match-btn" id="mw_${w}" onclick="selMatch('word','${esc(w)}')">${w}</button>`).join('');
  const rightCol=MS.meanings.map(m=>`<button class="match-btn" id="mm_${m.id}" onclick="selMatch('meaning','${esc(m.id)}')">${m.m}</button>`).join('');
  return `<div class="match-info">Nhấn từ tiếng Anh → nhấn nghĩa tương ứng để ghép đôi (7 cặp)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div style="display:flex;flex-direction:column;gap:8px">${leftCol}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${rightCol}</div>
  </div>
  <div id="matchMsg"></div>`;
}

function selMatch(type,id){
  const btnId=type==='word'?'mw_'+id:'mm_'+id;
  const btn=document.getElementById(btnId);
  if(!btn||btn.disabled)return;
  if(!MS.sel){
    document.querySelectorAll('.match-btn.selected').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');MS.sel={type,id,btn};return;
  }
  if(MS.sel.btn===btn){btn.classList.remove('selected');MS.sel=null;return;}
  if(MS.sel.type===type){MS.sel.btn.classList.remove('selected');btn.classList.add('selected');MS.sel={type,id,btn};return;}
  const wId=type==='word'?id:MS.sel.id;
  const mId=type==='meaning'?id:MS.sel.id;
  const wBtn=type==='word'?btn:MS.sel.btn;
  const mBtn=type==='meaning'?btn:MS.sel.btn;
  if(wId===mId){
    [wBtn,mBtn].forEach(b=>{b.classList.remove('selected');b.classList.add('matched');b.disabled=true;});
    MS.matched.add(wId);MS.done++;markLearned(wId);
    if(MS.done===MS.words.length)
      document.getElementById('matchMsg').innerHTML=`<div class="feedback ok">🎉 Xuất sắc! Ghép đúng tất cả ${MS.done} cặp! <button class="btn-primary" style="margin-left:10px" onclick="switchTab('match')">Chơi lại</button></div>`;
  } else {
    [wBtn,mBtn].forEach(b=>b.classList.add('err'));
    setTimeout(()=>[wBtn,mBtn].forEach(b=>b.classList.remove('err','selected')),700);
  }
  MS.sel=null;
}

// INIT

window.onload=()=>{
  // Preload voices
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  state.quiz.shuffled=shuffle(DAYS[0].words);
  state.fill.shuffled=shuffle(DAYS[0].words);
  renderSidebar();renderMain();
  document.getElementById('totalProg').textContent=totalLearned()+' / 1000 từ';
};

window.selectDay=selectDay;window.switchTab=switchTab;
window.flipFC=flipFC;window.nextFC=nextFC;window.prevFC=prevFC;window.rateFC=rateFC;
window.answerQuiz=answerQuiz;window.nextQuiz=nextQuiz;
window.checkFill=checkFill;window.hintFill=hintFill;window.nextFill=nextFill;
window.selMatch=selMatch;window.markLearned=markLearned;
window.speak=speak;window.toggleCard=toggleCard;
</script>
