<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thắng Tâm Học TOEIC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#26215C;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --red-light:#FCEBEB;--red:#A32D2D;
  --green-light:#EAF3DE;--green:#3B6D11;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --gray:#888;--gray-light:#F5F5F3;--gray-border:#E0DDD5;
  --text:#1a1a1a;--text-muted:#666;--bg:#FAFAF8;--card:#fff;
  --radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
header{background:var(--purple-dark);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:17px;font-weight:600}
.total-prog{font-size:12px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:210px;min-width:210px;background:var(--card);border-right:1px solid var(--gray-border);padding:12px 0;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
.main{flex:1;padding:24px;max-width:900px}
.sidebar-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;padding:0 14px 6px}
.day-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.day-item:hover{background:var(--gray-light)}
.day-item.active{background:var(--purple-light);border-left-color:var(--purple)}
.day-item .dn{font-weight:600;font-size:12px;min-width:48px;color:var(--text)}
.day-item .dt{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-item.active .dn,.day-item.active .dt{color:var(--purple-dark)}
.topic-header{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:18px}
.topic-header h2{font-size:19px;font-weight:600;color:var(--purple-dark);margin-bottom:6px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;margin-right:6px}
.badge-purple{background:var(--purple-light);color:var(--purple-dark)}
.badge-teal{background:var(--teal-light);color:var(--teal)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.progress-bar{height:6px;background:var(--gray-light);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .4s}
.progress-label{font-size:12px;color:var(--text-muted);margin:8px 0 4px;display:flex;justify-content:space-between}
.tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--gray-border);flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:var(--radius) var(--radius) 0 0;transition:all .15s;white-space:nowrap}
.tab:hover{background:var(--gray-light)}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);background:var(--purple-light);font-weight:500}
.word-cards{display:flex;flex-direction:column;gap:10px}
.word-card{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);overflow:hidden}
.wch{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;flex-wrap:wrap}
.wch:hover{background:var(--gray-light)}
.wc-stt{font-size:11px;font-weight:700;color:var(--text-muted);min-width:28px}
.wc-en{font-size:17px;font-weight:700;color:var(--purple-dark);min-width:150px}
.wc-ph{font-size:12px;color:var(--text-muted);flex:1}
.wc-tp{font-size:11px;padding:2px 7px;border-radius:12px;background:var(--purple-light);color:var(--purple-dark)}
.wc-vi{font-size:13px;color:var(--teal);font-weight:500;margin-left:auto}
.btn-audio{background:none;border:1px solid var(--gray-border);border-radius:8px;padding:4px 9px;cursor:pointer;font-size:15px;color:var(--purple);transition:all .15s}
.btn-audio:hover{background:var(--purple-light)}
.btn-mark{font-size:12px;padding:4px 11px;border:1px solid var(--gray-border);border-radius:20px;background:var(--card);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.btn-mark.marked{background:var(--green-light);border-color:var(--green);color:var(--green)}
.wce{padding:0 16px 14px;border-top:1px solid var(--gray-border)}
.ex-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 7px}
.ex-item{background:var(--gray-light);border-radius:var(--radius);padding:9px 13px;margin-bottom:7px}
.ex-en{font-size:14px;line-height:1.5}
.ex-en .hl{color:var(--purple);font-weight:600}
.ex-vi{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:2px}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.utag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--amber-light);color:var(--amber);border:1px solid rgba(186,117,23,.2)}
.noun-info{background:var(--teal-light);border-radius:var(--radius);padding:9px 13px;margin-top:8px;font-size:13px;color:var(--teal)}
.fc-box{display:flex;flex-direction:column;align-items:center;gap:14px}
.flashcard{width:100%;max-width:520px;min-height:210px;background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:30px 28px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;user-select:none;transition:box-shadow .2s}
.flashcard:hover{box-shadow:0 4px 16px rgba(83,74,183,.12)}
.fc-word{font-size:30px;font-weight:700;color:var(--purple-dark)}
.fc-ph{font-size:14px;color:var(--text-muted)}
.fc-tp{font-size:12px;padding:2px 10px;border-radius:20px;background:var(--purple-light);color:var(--purple-dark)}
.fc-hint{font-size:13px;color:var(--text-muted)}
.fc-mean{font-size:22px;font-weight:600;color:var(--teal)}
.fc-ex{font-size:13px;color:var(--text-muted);font-style:italic;max-width:380px;line-height:1.5;margin-top:4px}
.fc-abtn{padding:5px 14px;border:1px solid var(--purple);border-radius:var(--radius);background:var(--purple-light);cursor:pointer;font-size:13px;color:var(--purple);font-family:inherit}
.fc-rat{display:flex;gap:10px;margin-top:6px}
.fc-rat button{padding:6px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.btn-know{background:var(--green-light);color:var(--green)}
.btn-no{background:var(--red-light);color:var(--red)}
.fc-nav{display:flex;align-items:center;gap:14px}
.fc-nav button{padding:8px 20px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit}
.fc-nav button:hover{background:var(--gray-light)}
.fc-cnt{font-size:14px;color:var(--text-muted);min-width:55px;text-align:center}
.qwrap{max-width:600px}
.score-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sc{padding:4px 13px;border-radius:20px;font-size:13px;font-weight:500}
.sc.ok{background:var(--green-light);color:var(--green)}
.sc.err{background:var(--red-light);color:var(--red)}
.sc.tot{background:var(--purple-light);color:var(--purple-dark)}
.quiz-q{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px;font-size:15px;font-weight:500;line-height:1.6}
.qctx{font-size:13px;color:var(--text-muted);font-style:italic;margin-top:5px;font-weight:400}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.opt{padding:11px 13px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;text-align:left;font-family:inherit;line-height:1.4;transition:all .15s}
.opt:hover:not(:disabled){background:var(--gray-light)}
.opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:500}
.opt.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
.fb{padding:11px 14px;border-radius:var(--radius);font-size:14px;margin-bottom:12px;line-height:1.5}
.fb.ok{background:var(--green-light);color:var(--green)}
.fb.fail{background:var(--red-light);color:var(--red)}
.btn-p{padding:9px 22px;background:var(--purple);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;font-size:14px;font-family:inherit;font-weight:500}
.btn-p:hover{background:var(--purple-dark)}
.fill-input{width:100%;padding:10px 14px;border:1px solid var(--gray-border);border-radius:var(--radius);font-size:16px;font-family:inherit;background:var(--card);color:var(--text);margin-bottom:9px}
.fill-input:focus{outline:none;border-color:var(--purple)}
.fill-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.match-btn{padding:10px 12px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:13px;font-family:inherit;text-align:center;line-height:1.3;transition:all .15s}
.match-btn:hover:not([disabled]){background:var(--gray-light)}
.match-btn.selected{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);font-weight:500}
.match-btn.matched{background:var(--green-light);border-color:var(--green);color:var(--green);cursor:default}
.match-btn.err{background:var(--red-light);border-color:var(--red)}
.gram-section{background:var(--card);border:1px solid var(--gray-border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:16px}
.gram-title{font-size:16px;font-weight:600;color:var(--purple-dark);margin-bottom:6px}
.gram-desc{font-size:13px;color:var(--text-muted);margin-bottom:14px;line-height:1.6}
.gram-rule{background:var(--purple-light);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:13px;line-height:1.6}
.gram-eg{background:var(--gray-light);border-radius:var(--radius);padding:9px 13px;margin-bottom:8px;font-size:13px}
.gram-eg .en{color:var(--text);line-height:1.5}
.gram-eg .en .hl{color:var(--purple);font-weight:600;text-decoration:underline;text-decoration-color:rgba(83,74,183,.4)}
.gram-eg .vi{color:var(--text-muted);font-style:italic;font-size:12px;margin-top:2px}
.gram-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.gram-tab{padding:6px 14px;border:1px solid var(--gray-border);border-radius:20px;cursor:pointer;font-size:13px;color:var(--text-muted);background:var(--card);font-family:inherit;transition:all .15s}
.gram-tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.gram-tab:hover:not(.active){background:var(--gray-light)}
.noun-ex-q{font-size:15px;font-weight:500;margin-bottom:12px;line-height:1.6;background:var(--gray-light);padding:12px 16px;border-radius:var(--radius)}
.noun-opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.noun-opt{padding:9px 18px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s}
.noun-opt:hover:not(:disabled){background:var(--gray-light)}
.noun-opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:500}
.noun-opt.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
.explain-box{background:var(--amber-light);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#7a5000;margin-bottom:12px;line-height:1.6;display:none}
.explain-box.show{display:block}
.sent-parts{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.sent-part{padding:6px 12px;border-radius:var(--radius);font-size:14px;border:2px solid var(--gray-border);cursor:pointer;transition:all .2s;background:var(--card)}
.sent-part:hover{background:var(--gray-light)}
.sent-part.correct-pos{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:600}
.sent-part.wrong-pos{background:var(--red-light);border-color:var(--red);color:var(--red)}
@media(max-width:640px){.sidebar{display:none}.main{padding:14px}.opts{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>🎓 Thắng Tâm Học TOEIC</h1>
  <span class="total-prog" id="totalProg">0 / 100 từ</span>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="mainContent"></main>
</div>
<script>
function speak(w){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=0.82;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang==='en-US')||vs.find(x=>x.lang.startsWith('en'));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

// DATA — đúng thứ tự STT 1-100, chia 10 ngày × 10 từ
// ═══════════════════════════════════════════════════
const DAYS=[

   ex:[{e:"The <b>cancellation</b> of the meeting was due to the bad weather.",v:"Việc hủy cuộc họp là do thời tiết xấu."},

  {stt:5,w:"determine",tp:"v",ph:"/dɪˈtɜːrmɪn/",m:"xác định, quyết định",
   noun:null,

       {e:"The company wants to <b>engage</b> more young customers.",v:"Công ty muốn thu hút thêm nhiều khách hàng trẻ."}],

// ── NGÀY 2: STT 11–20 ─────────────────────────────
{topic:"Ngày 2 · STT 11–20", words:[
  {stt:11,w:"resolve",tp:"v",ph:"/rɪˈzɒlv/",m:"giải quyết",
   noun:null,
   ex:[{e:"The manager is trying to <b>resolve</b> the dispute between the employees.",v:"Người quản lý đang cố gắng giải quyết tranh chấp giữa các nhân viên."},

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const S={
  day:0,tab:'list',
  flash:{idx:0,flipped:false},
  quiz:{idx:0,correct:0,total:0,answered:false,shuffled:[]},
  fill:{idx:0,correct:0,total:0,answered:false,shuffled:[]},
  gram:{subtab:'theory',qIdx:0,correct:0,total:0,answered:false},
  learned:JSON.parse(localStorage.getItem('tt_l')||'[]')
};
function save(){localStorage.setItem('tt_l',JSON.stringify(S.learned));}
function shuf(a){return a.slice().sort(()=>Math.random()-.5);}
function gw(){return DAYS[S.day].words;}
function tl(){return S.learned.length;}
function markL(w){if(!S.learned.includes(w)){S.learned.push(w);save();}upProg();}
function upProg(){document.getElementById('totalProg').textContent=tl()+' / 100 từ';}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

// ── SIDEBAR ───────────────────────────────────────
function renderSidebar(){
  let h='<div class="sidebar-title">Lịch học</div>';
  DAYS.forEach((d,i)=>{
    const done=d.words.every(w=>S.learned.includes(w.w));
    const first=d.words[0].stt, last=d.words[d.words.length-1].stt;
    h+=`<div class="day-item${S.day===i?' active':''}" onclick="selDay(${i})">
      <span class="dn">Ngày ${i+1}</span>
      <span class="dt">STT ${first}–${last}</span>
      ${done?'<span style="color:var(--green);font-size:13px;margin-left:auto">✓</span>':''}
    </div>`;
  });
  document.getElementById('sidebar').innerHTML=h;
}

function selDay(i){
  S.day=i;S.tab='list';
  S.flash={idx:0,flipped:false};
  S.quiz={idx:0,correct:0,total:0,answered:false,shuffled:shuf(DAYS[i].words)};
  S.fill={idx:0,correct:0,total:0,answered:false,shuffled:shuf(DAYS[i].words)};
  S.gram={subtab:'theory',qIdx:0,correct:0,total:0,answered:false};
  renderSidebar();renderMain();
}

// ── MAIN ──────────────────────────────────────────
function renderMain(){
  const d=DAYS[S.day];
  const lc=d.words.filter(w=>S.learned.includes(w.w)).length;
  const pct=Math.round(lc/d.words.length*100);
  const first=d.words[0].stt,last=d.words[d.words.length-1].stt;
  document.getElementById('mainContent').innerHTML=`
  <div class="topic-header">
    <h2>Ngày ${S.day+1}: ${d.topic}</h2>
    <div>
      <span class="badge badge-purple">${d.words.length} từ</span>
      <span class="badge badge-teal">${lc} đã học</span>
      <span class="badge badge-amber">STT ${first}–${last}</span>
    </div>
    <div class="progress-label"><span>Tiến độ hôm nay</span><span>${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="tabs">
    <div class="tab${S.tab==='list'?' active':''}" onclick="swTab('list')">📋 Từ vựng</div>
    <div class="tab${S.tab==='flash'?' active':''}" onclick="swTab('flash')">🃏 Flashcard</div>
    <div class="tab${S.tab==='quiz'?' active':''}" onclick="swTab('quiz')">❓ Trắc nghiệm</div>
    <div class="tab${S.tab==='fill'?' active':''}" onclick="swTab('fill')">✍️ Điền từ</div>
    <div class="tab${S.tab==='match'?' active':''}" onclick="swTab('match')">🔗 Ghép đôi</div>
    <div class="tab${S.tab==='gram'?' active':''}" onclick="swTab('gram')">📐 Luyện Danh Từ</div>
  </div>
  <div id="tc"></div>`;
  upProg();renderTab();
}

function swTab(t){
  S.tab=t;
  if(t==='quiz')S.quiz={idx:0,correct:0,total:0,answered:false,shuffled:shuf(gw())};
  if(t==='fill')S.fill={idx:0,correct:0,total:0,answered:false,shuffled:shuf(gw())};
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.className='tab'+(['list','flash','quiz','fill','match','gram'][i]===t?' active':'');
  });
  renderTab();
}

function renderTab(){
  const tc=document.getElementById('tc');if(!tc)return;
  if(S.tab==='list')tc.innerHTML=renderList();
  else if(S.tab==='flash')tc.innerHTML=renderFlash();
  else if(S.tab==='quiz')tc.innerHTML=renderQuiz();
  else if(S.tab==='fill'){tc.innerHTML=renderFill();setupFill();}
  else if(S.tab==='match')tc.innerHTML=renderMatch();
  else if(S.tab==='gram')tc.innerHTML=renderGram();
}

// ── LIST ──────────────────────────────────────────
function renderList(){
  return '<div class="word-cards">'+gw().map((w,i)=>{
    const known=S.learned.includes(w.w);
    const exH=w.ex.map(e=>`<div class="ex-item">
      <div class="ex-en">${e.e.replace(/<b>(.*?)<\/b>/g,'<span class="hl">$1</span>')}</div>
      <div class="ex-vi">${e.v}</div>
    </div>`).join('');
    const tagH=(w.tags||[]).map(t=>`<span class="utag">${t}</span>`).join('');
    const nounH=w.noun?`<div class="noun-info">
      📌 <b>Danh từ:</b> số ít: <b>${w.noun.singular}</b>${w.noun.plural?' · số nhiều: <b>'+w.noun.plural+'</b>':' · không có số nhiều'}
      &nbsp;·&nbsp; ${w.noun.countable?'✅ Đếm được':'⚠️ Không đếm được'}
      &nbsp;·&nbsp; Quy tắc: ${w.noun.rule}
    </div>`:'';
    return `<div class="word-card">
      <div class="wch" onclick="toggleW(${i})">
        <span class="wc-stt">#${w.stt}</span>
        <span class="wc-en">${w.w}</span>
        <span class="wc-ph">${w.ph}</span>
        <span class="wc-tp">${w.tp}</span>
        <span class="wc-vi">${w.m}</span>
        <button class="btn-audio" onclick="event.stopPropagation();speak('${w.w.split(' ')[0]}')" title="Phát âm">🔊</button>
        <button class="btn-mark${known?' marked':''}" onclick="event.stopPropagation();markL('${esc(w.w)}');this.textContent='✓ Đã học';this.classList.add('marked')">${known?'✓ Đã học':'Đánh dấu'}</button>
      </div>
      <div id="wx${i}" style="display:none" class="wce">
        <div class="ex-title">📖 Ví dụ câu</div>${exH}
        ${nounH}
        <div class="ex-title" style="margin-top:8px">🏷️ Ngữ cảnh</div>
        <div class="tag-row">${tagH}</div>
      </div>
    </div>`;
  }).join('')+'</div>';
}
function toggleW(i){const e=document.getElementById('wx'+i);if(e)e.style.display=e.style.display==='none'?'block':'none';}

// ── FLASHCARD ─────────────────────────────────────
function renderFlash(){
  const w=gw()[S.flash.idx];
  const ex=w.ex[0]?w.ex[0].e.replace(/<b>(.*?)<\/b>/g,'<u>$1</u>'):'';
  const f=S.flash.flipped;
  return `<div class="fc-box">
    <div class="flashcard" onclick="flipFC()">
      ${!f?`<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">#${w.stt}</div>
        <div class="fc-word">${w.w}</div>
        <div class="fc-ph">${w.ph}</div>
        <div class="fc-tp">${w.tp}</div>
        <button class="fc-abtn" onclick="event.stopPropagation();speak('${w.w.split(' ')[0]}')">🔊 Nghe phát âm</button>
        <div class="fc-hint">Nhấn thẻ để xem nghĩa</div>
      `:`<div class="fc-mean">${w.m}</div>
        <div style="font-size:14px;color:var(--text-muted)">${w.w} · ${w.ph}</div>
        ${ex?`<div class="fc-ex">${ex}</div>`:''}
        <div class="fc-rat">
          <button class="btn-no" onclick="event.stopPropagation();rateFC(false)">😕 Chưa nhớ</button>
          <button class="btn-know" onclick="event.stopPropagation();rateFC(true)">✅ Đã nhớ</button>
        </div>`}
    </div>
    <div class="fc-nav">
      <button onclick="prevFC()">← Trước</button>
      <span class="fc-cnt">${S.flash.idx+1}/${gw().length}</span>
      <button onclick="nextFC()">Tiếp →</button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);text-align:center">← → để chuyển · Space để lật</div>
  </div>`;
}
function flipFC(){S.flash.flipped=!S.flash.flipped;renderTab();}
function nextFC(){S.flash.idx=(S.flash.idx+1)%gw().length;S.flash.flipped=false;renderTab();}
function prevFC(){S.flash.idx=(S.flash.idx-1+gw().length)%gw().length;S.flash.flipped=false;renderTab();}
function rateFC(k){if(k)markL(gw()[S.flash.idx].w);nextFC();}
document.addEventListener('keydown',e=>{
  if(S.tab!=='flash')return;
  if(e.key==='ArrowRight')nextFC();
  else if(e.key==='ArrowLeft')prevFC();
  else if(e.key===' '){e.preventDefault();flipFC();}
});

// ── QUIZ ──────────────────────────────────────────
function renderQuiz(){
  const q=S.quiz;
  const qw=q.shuffled[q.idx%q.shuffled.length];
  const wrong=shuf(gw().filter(x=>x.w!==qw.w)).slice(0,3).map(x=>x.m);
  const opts=shuf([qw.m,...wrong]);
  const ctx=qw.ex[0]?qw.ex[0].e.replace(/<b>(.*?)<\/b>/g,'<b>______</b>'):'';
  return `<div class="qwrap">
    <div class="score-row">
      <span class="sc ok">✓ ${q.correct}</span>
      <span class="sc err">✗ ${q.total-q.correct}</span>
      <span class="sc tot">Tổng: ${q.total}</span>
    </div>
    <div class="quiz-q">
      <span style="font-size:12px;color:var(--text-muted)">#${qw.stt}</span>&nbsp;
      Từ <strong>"${qw.w}"</strong> <span style="color:var(--text-muted);font-size:13px">${qw.ph}</span> có nghĩa là gì?
      ${ctx?`<div class="qctx">💬 ${ctx}</div>`:''}
    </div>
    <div class="opts">${opts.map(o=>`<button class="opt" onclick="ansQ(this,'${esc(o)}','${esc(qw.m)}','${esc(qw.w)}')">${o}</button>`).join('')}</div>
    <div id="qfb"></div>
    <button class="btn-p" id="nq" style="display:none" onclick="nextQ()">Câu tiếp →</button>
  </div>`;
}
function ansQ(btn,chosen,correct,word){
  if(S.quiz.answered)return;
  S.quiz.answered=true;S.quiz.total++;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(chosen===correct){S.quiz.correct++;btn.classList.add('correct');document.getElementById('qfb').innerHTML=`<div class="fb ok">✅ Đúng! <b>${word}</b> = ${correct}</div>`;markL(word);}
  else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});document.getElementById('qfb').innerHTML=`<div class="fb fail">❌ Sai! Đáp án: <b>${correct}</b></div>`;}
  document.getElementById('nq').style.display='inline-block';
}
function nextQ(){S.quiz.idx++;S.quiz.answered=false;renderTab();}

// ── FILL ──────────────────────────────────────────
function renderFill(){
  const f=S.fill;
  const qw=f.shuffled[f.idx%f.shuffled.length];
  const ctx=qw.ex[0]?qw.ex[0].e.replace(/<b>(.*?)<\/b>/g,'______'):'';
  return `<div class="qwrap">
    <div class="score-row"><span class="sc ok">✓ ${f.correct}</span><span class="sc err">✗ ${f.total-f.correct}</span><span class="sc tot">Tổng: ${f.total}</span></div>
    <div class="quiz-q">
      <span style="font-size:12px;color:var(--text-muted)">#${qw.stt}</span>&nbsp;
      Nghĩa: <strong>${qw.m}</strong><br>
      <span style="font-size:13px;color:var(--text-muted)">${qw.tp} · ${qw.ph}</span>
      ${ctx?`<div class="qctx">💬 ${ctx}</div>`:''}
    </div>
    <input class="fill-input" id="fi" type="text" placeholder="Nhập từ tiếng Anh..." autocomplete="off"/>
    <div class="fill-actions">
      <button class="btn-p" onclick="checkFill('${esc(qw.w)}')">Kiểm tra</button>
      <button style="padding:8px 14px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:13px;font-family:inherit" onclick="speak('${qw.w.split(' ')[0]}')">🔊 Gợi ý âm</button>
      <button style="padding:8px 14px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:13px;font-family:inherit" onclick="hintF('${esc(qw.w)}')">💡 Gợi ý chữ</button>
    </div>
    <div id="ffb"></div>
    <button class="btn-p" id="nf" style="display:none;margin-top:10px" onclick="nextFill()">Câu tiếp →</button>
  </div>`;
}
function setupFill(){const i=document.getElementById('fi');if(i){i.focus();const qw=S.fill.shuffled[S.fill.idx%S.fill.shuffled.length];i.onkeydown=e=>{if(e.key==='Enter')checkFill(qw.w);};}}
function hintF(c){const i=document.getElementById('fi');if(i)i.value=c[0]+'_'.repeat(c.length-1);}
function checkFill(correct){
  if(S.fill.answered)return;
  const i=document.getElementById('fi');if(!i)return;
  const v=i.value.trim().toLowerCase();
  S.fill.answered=true;S.fill.total++;i.disabled=true;
  if(v===correct.toLowerCase()){S.fill.correct++;document.getElementById('ffb').innerHTML=`<div class="fb ok">✅ Chính xác!</div>`;markL(correct);}
  else document.getElementById('ffb').innerHTML=`<div class="fb fail">❌ Sai! Đáp án: <b>${correct}</b></div>`;
  document.getElementById('nf').style.display='inline-block';
  speak(correct.split(' ')[0]);
}
function nextFill(){S.fill.idx++;S.fill.answered=false;renderTab();setupFill();}

// ── MATCH ─────────────────────────────────────────
let MS={sel:null,done:0,words:[],meanings:[],matched:new Set()};
function renderMatch(){
  const pairs=shuf(gw()).slice(0,6);
  MS={sel:null,done:0,words:shuf(pairs.map(p=>p.w)),meanings:shuf(pairs.map(p=>({id:p.w,m:p.m}))),matched:new Set()};
  const L=MS.words.map(w=>`<button class="match-btn" id="mw_${w.replace(/\s/g,'_')}" onclick="selM('word','${esc(w)}')">${w}</button>`).join('');
  const R=MS.meanings.map(m=>`<button class="match-btn" id="mm_${m.id.replace(/\s/g,'_')}" onclick="selM('meaning','${esc(m.id)}')">${m.m}</button>`).join('');
  return `<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Nhấn từ tiếng Anh → nhấn nghĩa tương ứng (6 cặp)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
    <div style="display:flex;flex-direction:column;gap:7px">${L}</div>
    <div style="display:flex;flex-direction:column;gap:7px">${R}</div>
  </div><div id="mm"></div>`;
}
function selM(type,id){
  const bId=type==='word'?'mw_'+id.replace(/\s/g,'_'):'mm_'+id.replace(/\s/g,'_');
  const btn=document.getElementById(bId);
  if(!btn||btn.disabled)return;
  if(!MS.sel){document.querySelectorAll('.match-btn.selected').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');MS.sel={type,id,btn};return;}
  if(MS.sel.btn===btn){btn.classList.remove('selected');MS.sel=null;return;}
  if(MS.sel.type===type){MS.sel.btn.classList.remove('selected');btn.classList.add('selected');MS.sel={type,id,btn};return;}
  const wId=type==='word'?id:MS.sel.id;
  const mId=type==='meaning'?id:MS.sel.id;
  const wb=type==='word'?btn:MS.sel.btn;
  const mb=type==='meaning'?btn:MS.sel.btn;
  if(wId===mId){[wb,mb].forEach(b=>{b.classList.remove('selected');b.classList.add('matched');b.disabled=true;});MS.matched.add(wId);MS.done++;markL(wId);
    if(MS.done===MS.words.length)document.getElementById('mm').innerHTML=`<div class="fb ok">🎉 Xuất sắc! Ghép đúng tất cả! <button class="btn-p" style="margin-left:10px" onclick="swTab('match')">Chơi lại</button></div>`;}
  else{[wb,mb].forEach(b=>b.classList.add('err'));setTimeout(()=>[wb,mb].forEach(b=>b.classList.remove('err','selected')),700);}
  MS.sel=null;
}

function renderGram(){
  const st=S.gram.subtab;
  const tabs=[
    {id:'theory',label:'📚 Lý thuyết'},
    {id:'plural',label:'📝 Số ít/Số nhiều'},
    {id:'position',label:'🎯 Vị trí Danh từ'},
    {id:'article',label:'🔤 Mạo từ a/an/the'},
  ];
  const tabH=`<div class="gram-tabs">${tabs.map(t=>`<button class="gram-tab${st===t.id?' active':''}" onclick="swGram('${t.id}')">${t.label}</button>`).join('')}</div>`;
  if(st==='theory')return tabH+renderGramTheory();
  if(st==='plural')return tabH+renderGramEx(PLURAL_QS);
  if(st==='position')return tabH+renderGramPosition();
  if(st==='article')return tabH+renderGramEx(ARTICLE_QS);
  return tabH;
}
function swGram(t){S.gram={subtab:t,qIdx:0,correct:0,total:0,answered:false};renderTab();}

      <tr style="border-bottom:1px solid var(--gray-border)"><td style="padding:8px">Đuôi <b>-y</b> sau phụ âm → <b>-ies</b></td><td style="padding:8px">strategy → <b>strategies</b>, party → <b>parties</b>, variety → <b>varieties</b></td></tr>
      <tr style="border-bottom:1px solid var(--gray-border)"><td style="padding:8px">Đuôi <b>-ch/-sh/-s/-x</b> → <b>-es</b></td><td style="padding:8px">search → <b>searches</b>, process → <b>processes</b>, address → <b>addresses</b></td></tr>
      <tr><td style="padding:8px">Không đếm được → <b>không có số nhiều</b></td><td style="padding:8px">satisfaction, persuasion, inspiration, access, appreciation, popularity</td></tr>
    </table>
  </div>
  <div class="gram-section">
    <div class="gram-title">3️⃣ Vị trí của Danh từ trong câu</div>
    <div class="gram-rule"><b>① Chủ ngữ (Subject)</b> — đứng TRƯỚC động từ<br><b>② Tân ngữ (Object)</b> — đứng SAU động từ<br><b>③ Sau giới từ</b> — đứng sau: in, on, at, of, about, with, for...</div>
    <div class="gram-eg"><div class="en"><span class="hl">The agreement</span> was signed. → <b>Chủ ngữ</b></div><div class="vi">Thỏa thuận đã được ký.</div></div>
    <div class="gram-eg"><div class="en">We reached <span class="hl">an agreement</span>. → <b>Tân ngữ</b></div><div class="vi">Chúng tôi đã đạt được thỏa thuận.</div></div>
    <div class="gram-eg"><div class="en">We talked about <span class="hl">the agreement</span>. → <b>Sau giới từ 'about'</b></div><div class="vi">Chúng tôi đã nói về thỏa thuận.</div></div>
  </div>
  <div class="gram-section">
    <div class="gram-title">4️⃣ Mạo từ a / an / the / ∅</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <tr style="background:var(--purple-light)"><th style="padding:8px;text-align:left">Mạo từ</th><th style="padding:8px;text-align:left">Dùng khi nào</th><th style="padding:8px;text-align:left">Ví dụ</th></tr>
      <tr style="border-bottom:1px solid var(--gray-border)"><td style="padding:8px"><b>a</b></td><td style="padding:8px">Số ít, lần đầu đề cập, bắt đầu bằng phụ âm</td><td style="padding:8px">a <b>strategy</b>, a <b>risk</b>, a <b>party</b></td></tr>
      <tr style="border-bottom:1px solid var(--gray-border)"><td style="padding:8px"><b>an</b></td><td style="padding:8px">Số ít, lần đầu đề cập, bắt đầu bằng nguyên âm</td><td style="padding:8px">an <b>agreement</b>, an <b>offer</b>, an <b>arrangement</b></td></tr>
      <tr style="border-bottom:1px solid var(--gray-border)"><td style="padding:8px"><b>the</b></td><td style="padding:8px">Đã biết, đã đề cập, hoặc chỉ định cụ thể</td><td style="padding:8px">the <b>contract</b>, the <b>meeting</b>, the <b>provisions</b></td></tr>
      <tr><td style="padding:8px"><b>∅</b></td><td style="padding:8px">Uncountable (chung) hoặc số nhiều chung</td><td style="padding:8px"><b>Satisfaction</b> is key. <b>Strategies</b> matter.</td></tr>
    </table>
  </div>`;
}

function renderGramEx(questions){
  const g=S.gram;
  const q=questions[g.qIdx%questions.length];
  const isOpts=!!q.opts;
  const optsH=isOpts?`<div class="noun-opts">${q.opts.map(o=>`<button class="noun-opt" onclick="ansGram(this,'${esc(o)}','${esc(q.a)}')">${o}</button>`).join('')}</div>`:'';
  const fillH=!isOpts?`<input class="fill-input" id="gfi" type="text" placeholder="Nhập đáp án..." autocomplete="off"/><div class="fill-actions">
    <button class="btn-p" onclick="ansGramFill('${esc(q.a)}')">Kiểm tra</button>
    ${q.hint?`<button style="padding:8px 14px;border:1px solid var(--gray-border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:13px;font-family:inherit" onclick="document.getElementById('gfi').placeholder='Gợi ý: ${esc(q.hint)}'">💡 Gợi ý</button>`:''}
  </div>`:'';
  return `<div class="gram-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="sc tot" style="display:inline-block">Điểm: ${g.correct}/${g.total}</span>
      <span style="font-size:13px;color:var(--text-muted)">Câu ${g.qIdx%questions.length+1}/${questions.length}</span>
    </div>
    <div class="noun-ex-q">${q.q}${q.rule?`<div style="font-size:12px;color:var(--text-muted);margin-top:4px">💡 Quy tắc: ${q.rule}</div>`:''}</div>
    ${optsH}${fillH}
    <div class="explain-box" id="expbox">${q.explain||''}</div>
    <button class="btn-p" id="ngram" style="display:none;margin-top:4px" onclick="nextGram(${questions.length})">Câu tiếp →</button>
  </div>`;
}

function ansGram(btn,chosen,correct){
  if(S.gram.answered)return;
  S.gram.answered=true;S.gram.total++;
  document.querySelectorAll('.noun-opt').forEach(b=>b.disabled=true);
  if(chosen===correct){S.gram.correct++;btn.classList.add('correct');}
  else{btn.classList.add('wrong');document.querySelectorAll('.noun-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});}
  const ex=document.getElementById('expbox');if(ex)ex.classList.add('show');
  document.getElementById('ngram').style.display='inline-block';
}
function ansGramFill(correct){
  if(S.gram.answered)return;
  const i=document.getElementById('gfi');if(!i)return;
  const v=i.value.trim().toLowerCase();
  S.gram.answered=true;S.gram.total++;i.disabled=true;
  if(v===correct.toLowerCase()){S.gram.correct++;i.style.borderColor='var(--green)';}
  else{i.style.borderColor='var(--red)';i.value='❌ Đáp án đúng: '+correct;}
  const ex=document.getElementById('expbox');if(ex)ex.classList.add('show');
  document.getElementById('ngram').style.display='inline-block';
}
function nextGram(len){S.gram.qIdx++;S.gram.answered=false;renderTab();}

function renderGramPosition(){
  const g=S.gram;
  const q=POSITION_QS[g.qIdx%POSITION_QS.length];
  const words=q.sent.replace(/[.,!?]/g,'').split(' ');
  const partsH=words.map((w,i)=>`<span class="sent-part" id="sp_${i}" onclick="selPos(${i},'${esc(w)}','${esc(q.noun)}')">${w}</span>`).join(' ');
  return `<div class="gram-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="sc tot" style="display:inline-block">Điểm: ${g.correct}/${g.total}</span>
      <span style="font-size:13px;color:var(--text-muted)">Câu ${g.qIdx%POSITION_QS.length+1}/${POSITION_QS.length}</span>
    </div>
    <div class="noun-ex-q">Nhấn vào <b>danh từ</b> <span style="color:var(--purple)">"${q.noun}"</span> trong câu dưới đây:</div>
    <div class="sent-parts">${partsH}</div>
    <div class="explain-box" id="posexp">${q.explain}<br><br>📌 Vị trí: <b style="color:var(--purple)">${q.role}</b></div>
    <button class="btn-p" id="npos" style="display:none;margin-top:8px" onclick="nextGram(${POSITION_QS.length})">Câu tiếp →</button>
  </div>`;
}
function selPos(idx,word,noun){
  if(S.gram.answered)return;
  S.gram.answered=true;S.gram.total++;
  const clean=word.replace(/[.,!?]/g,'').toLowerCase();
  const sp=document.getElementById('sp_'+idx);
  if(clean===noun.toLowerCase()){S.gram.correct++;sp.classList.add('correct-pos');}
  else{sp.classList.add('wrong-pos');
    document.querySelectorAll('.sent-part').forEach(el=>{if(el.textContent.replace(/[.,!?]/g,'').toLowerCase()===noun.toLowerCase())el.classList.add('correct-pos');});}
  const ex=document.getElementById('posexp');if(ex)ex.classList.add('show');
  document.getElementById('npos').style.display='inline-block';
}

// ── INIT ──────────────────────────────────────────
window.onload=()=>{
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  S.quiz.shuffled=shuf(DAYS[0].words);
  S.fill.shuffled=shuf(DAYS[0].words);
  renderSidebar();renderMain();upProg();
};
[selDay,swTab,toggleW,flipFC,nextFC,prevFC,rateFC,ansQ,nextQ,checkFill,hintF,nextFill,
 selM,swGram,ansGram,ansGramFill,nextGram,selPos,speak,markL].forEach(f=>window[f.name]=f);
